###########################################################################
# Cortex-M3 Embedded Debug Labs - Kiro CLI Optimized
###########################################################################

set-environment -g PROJECT "cortex-m3-labs"

# Enhanced status bar with lab info
set-option -g status-left-length 40
set-option -g status-left "#[fg=green,bold]󰒓 Cortex-M3 #[fg=cyan]#I:#W #[fg=yellow]#{pane_title}"
set-option -g status-right "#[fg=magenta]Kiro #[fg=white]%H:%M"

# Better pane border visibility
set-option -g pane-border-status top
set-option -g pane-border-format " #{pane_index} #{pane_title} "
set-option -g pane-border-style "fg=colour238"
set-option -g pane-active-border-style "fg=colour51,bold"

# Mouse support for pane selection (useful with kiro output)
set-option -g mouse on

# Increase scrollback for kiro output
set-option -g history-limit 10000

# Better copy mode for code snippets
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

###########################################################################
# Custom Key Bindings for Embedded Development
###########################################################################

# Quick window navigation
bind-key k select-window -t Kiro
bind-key d select-window -t Debug
bind-key l select-window -t Lab
bind-key a select-window -t Analysis
bind-key g select-window -t Git

# Quick pane synchronization (useful for running same command in multiple panes)
bind-key S set-window-option synchronize-panes \; display-message "Panes sync: #{?pane_synchronized,ON,OFF}"

# Quick lab build command
bind-key b command-prompt -p "Build lab:" "send-keys -t Lab.1 'make %%' C-m"

# Quick run command  
bind-key r command-prompt -p "Run lab:" "send-keys -t Lab.1 'make run LAB=%%' C-m"

###########################################################################
# Pane Management
###########################################################################

# Split panes using | and -
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# Resize panes with vim-like keys
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

###########################################################################
# Activity Monitoring
###########################################################################

# Alert when commands complete in other windows
set-option -g visual-activity on
set-window-option -g monitor-activity on

###########################################################################
# Embedded Development Helpers
###########################################################################

# Set environment variables for all panes
set-environment -g CORTEX_M3_ROOT "~/cortex-m3-embedded-debug-labs"
set-environment -g ARM_TOOLCHAIN "arm-none-eabi"
